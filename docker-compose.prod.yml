services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: adaptive_tree_analysis
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d adaptive_tree_analysis"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build:
      context: application
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DB_URL: jdbc:postgresql://db:5432/adaptive_tree_analysis
      DB_USERNAME: postgres
      DB_PASSWORD: ${DB_PASSWORD}
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8080"

  caddy:
    build:
      context: .
      dockerfile: deploy/caddy.Dockerfile
    restart: unless-stopped
    depends_on:
      - app
    environment:
      APP_DOMAIN: ${APP_DOMAIN}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - caddy_data:/data
      - caddy_config:/config

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
