server:
  port: 8080

spring:
  application:
    name: adaptive-tree-analysis-application
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/adaptive_tree_analysis}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
