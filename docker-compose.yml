version: "3.9"

services:
  db:
    image: postgres:15-alpine
    container_name: adaptive-tree-analysis-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: adaptive_tree_analysis
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d adaptive_tree_analysis"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  db_data:

